name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react-version: [18, 19]
    name: CI (React ${{ matrix.react-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Downgrade to React 18
        if: matrix.react-version == 18
        run: npm install --no-save react@18 react-dom@18 @types/react@18 @types/react-dom@18

      - name: Lint
        run: npm run lint

      - name: Run tests (with coverage thresholds)
        run: npm run test:coverage

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
