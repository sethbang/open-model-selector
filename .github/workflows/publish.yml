name: Publish to npm

# Uses npm's Trusted Publisher flow: this workflow authenticates to npm via
# GitHub's OIDC id-token — no NPM_TOKEN secret needed. The package's
# "Trusted Publishers" settings on npmjs.com must have this repo + this
# workflow path (`.github/workflows/publish.yml`) configured.
# Reference: https://docs.npmjs.com/trusted-publishers

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # id-token: write is required for OIDC authentication to npm and for
      # npm provenance attestation.
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate version matches tag
        env:
          TAG_VERSION: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi
          echo "✅ Tag $TAG_VERSION matches package.json version $PACKAGE_VERSION"

      - name: Publish to npm
        # --provenance generates a Sigstore attestation linking the published
        # tarball to this workflow run. Authentication is via OIDC (Trusted
        # Publisher) — npm-cli detects the id-token automatically, no env.
        run: npm publish --access public --provenance
